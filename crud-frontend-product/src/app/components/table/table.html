<div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
  <div class="overflow-x-auto">
    <table class="min-w-full border-separate border-spacing-0 text-sm">
      <thead class="bg-slate-50/95">
      <tr>
        @for (column of columns(); track column) {
          <th class="whitespace-nowrap border-b border-slate-200 px-5 py-3 text-left text-[11px] font-semibold uppercase tracking-[0.08em] text-slate-500">
            {{ column }}
          </th>
        }
        <th class="whitespace-nowrap border-b border-slate-200 px-5 py-3 text-right text-[11px] font-semibold uppercase tracking-[0.08em] text-slate-500">
          acciones
        </th>
      </tr>
    </thead>

    <tbody class="bg-white">
      @if (rows().length === 0) {
        <tr>
          <td class="px-5 py-12 text-center text-sm text-slate-500" [attr.colspan]="columns().length + 1">
            No hay datos para mostrar.
          </td>
        </tr>
      } @else {
        @for (row of rows(); track $index) {
          <tr class="transition-colors odd:bg-white even:bg-slate-50/25 hover:bg-slate-50">
            @for (column of columns(); track column) {
              <td class="max-w-[16rem] border-b border-slate-100 px-5 py-4 text-slate-700">
                <span class="block truncate font-medium">{{ formatValue(getCellValue(row, column)) }}</span>
              </td>
            }
            <td class="border-b border-slate-100 px-5 py-4">
              <div class="flex justify-end gap-2">
                <button
                  type="button"
                  class="rounded-lg border border-amber-200 bg-amber-50 px-3 py-1.5 text-xs font-semibold text-amber-800 transition hover:bg-amber-100"
                  (click)="onEdit(row)"
                >
                  Editar
                </button>
                <button
                  type="button"
                  class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-800 transition hover:bg-rose-100"
                  (click)="onDelete(row)"
                >
                  Eliminar
                </button>
              </div>
            </td>
          </tr>
        }
      }
    </tbody>
    </table>
  </div>
</div>
